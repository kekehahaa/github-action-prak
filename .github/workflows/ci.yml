name: Run Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        python-version: '3.10'
        activate-environment: ciprak
        auto-activate-base: false
    
    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda install pytest -y
        conda info
        conda list
    
    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest

        