name: Run Tests
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        python-version: '3.10'
        activate-environment: ciprak
        auto-activate-base: false
    
    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda install pytest flake8 -y
        conda info
        conda list

    - name: Lint with flake8
        shell: bash -l {0}
        run: |
          # Стоп ошибках или синтаксисе
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest

        